services:
  nginx:
    image: nginx:mainline-alpine-perl
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  app1:
    build: .
    container_name: app1
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILE: dev

  app2:
    build: .
    container_name: app2
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILE: dev

  app3:
    build: .
    container_name: app3
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILE: dev